<!DOCTYPE html>
<html>
<head>
  <title>Login</title>
</head>
<body>

<h2>Iniciar sesión</h2>

<input type="email" id="email" placeholder="Correo"><br><br>
<input type="password" id="password" placeholder="Contraseña"><br><br>

<button onclick="login()">Entrar</button>

<p id="mensaje"></p>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyDVR8vCGuKYjUR-9v_x80fNY5bPewMaxKU",
  authDomain: "hyisx-b4490.firebaseapp.com",
  projectId: "hyisx-b4490",
  storageBucket: "hyisx-b4490.firebasestorage.app",
  messagingSenderId: "960225169942",
  appId: "1:960225169942:web:f93314f0227420c75b5b37"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

window.login = function() {
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  signInWithEmailAndPassword(auth, email, password)
    .then(() => {
      window.location.href = "privado.html";
    })
    .catch((error) => {
      document.getElementById("mensaje").innerText = error.message;
    });
}
</script>

</body>
</html>
