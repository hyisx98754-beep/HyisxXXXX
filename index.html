<!DOCTYPE html>
<html>
<head>
  <title>Login</title>
</head>
<body>

<h2>Iniciar sesión</h2>

<input type="email" id="email" placeholder="Correo"><br><br>
<input type="password" id="password" placeholder="Contraseña"><br><br>

<button onclick="login()">Entrar</button>

<p id="mensaje"></p>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyBm7_S2vA9580O9s1IRa_XFy4Dn-3DOfFE",
  authDomain: "hyisxssgdgd.firebaseapp.com",
  projectId: "hyisxssgdgd",
  storageBucket: "hyisxssgdgd.firebasestorage.app",
  messagingSenderId: "334586019647",
  appId: "1:334586019647:web:57aa2ed86d62059491dd8a"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

window.login = function() {
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  signInWithEmailAndPassword(auth, email, password)
    .then(() => {
      window.location.href = "privado.html";
    })
    .catch((error) => {
      document.getElementById("mensaje").innerText = error.message;
    });
}
</script>

</body>
</html>
