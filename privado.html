<!DOCTYPE html>
<html>
<head>
  <title>Chat</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>

<body>

<!-- 🔔 Botón notificaciones -->
<button onclick="activarNotificaciones()" 
style="position:fixed; top:10px; right:10px; font-size:20px; z-index:1000;">
🔔
</button>

<h2>Chat 💬</h2>
  <div id="usuariosOnline"></div>

<button onclick="abrir('info')">📁 Información</button>
<button onclick="abrir('notas')">📁 Notas</button>
<button onclick="abrir('chat')">💬 Chat</button>

<br><br>

<div id="info" style="display:none;">
  <h3>Información</h3>
  <textarea id="textoInfo"></textarea>
  <button onclick="guardarInfo()">Guardar</button>
</div>

<div id="notas" style="display:none;">
  <h3>Notas</h3>
  <textarea id="textoNotas"></textarea>
  <button onclick="guardarNotas()">Guardar</button>
</div>

<div id="chat" style="height:300px; overflow-y:auto; border:1px solid #ccc; padding:10px;"></div>

<input type="text" id="mensaje" placeholder="Escribe algo">
<button onclick="enviar()">Enviar</button>

<br><br>
<button onclick="logout()">Cerrar sesión</button>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { getFirestore, collection, addDoc, onSnapshot, doc, setDoc, getDoc, query, orderBy, deleteDoc } 
from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
  import { getDatabase, ref, set, onValue, onDisconnect } 
from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

/* 🔔 NOTIFICACIONES */
window.activarNotificaciones = async function() {
  const permiso = await Notification.requestPermission();

  if (permiso === "granted") {
    alert("Notificaciones activadas 🔔");
  } else {
    alert("Permiso denegado ❌");
  }
};

/* 🔥 FIREBASE */
const firebaseConfig = {
  apiKey: "AIzaSyBm7_S2vA9580O9s1IRa_XFy4Dn-3DOfFE",
  authDomain: "hyisxssgdgd.firebaseapp.com",
  projectId: "hyisxssgdgd",
  storageBucket: "hyisxssgdgd.firebasestorage.app",
  messagingSenderId: "334586019647",
  appId: "1:334586019647:web:57aa2ed86d62059491dd8a"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);
const rtdb = getDatabase(app);
  
let usuarioActual = null;

/* 🔐 LOGIN */
onAuthStateChanged(auth, (user) => {
   if (!user) {
    window.location.href = "index.html";
  } else {
    usuarioActual = user.email;

    // 🟢 REFERENCIA DEL USUARIO (usando email)
    const userRef = ref(rtdb, "usuarios/" + user.email.replace(/\./g, "_"));

    // 🟢 ONLINE
    set(userRef, {
      online: true,
      ultimaConexion: Date.now()
    });

    // 🔴 OFFLINE AUTOMÁTICO
    onDisconnect(userRef).set({
      online: false,
      ultimaConexion: Date.now()
    });

    cargarInfo();
    abrir("chat");
  }
});
 

/* 💬 CHAT */
const q = query(collection(db, "mensajes"), orderBy("fecha", "asc"));

let primeraCarga = true;

onSnapshot(q, (snapshot) => {
  const chat = document.getElementById("chat");
  chat.innerHTML = "";

  snapshot.forEach((docu) => {
    const data = docu.data();

    let botonBorrar = "";

    // 👑 SOLO TÚ
    if (usuarioActual === "systexhyisx@gmail.com") {
      botonBorrar = `<button onclick="borrar('${docu.id}')">❌</button>`;
    }

    // Mostrar mensaje o imagen
   const fecha = new Date(data.fecha);
const hora = fecha.getHours().toString().padStart(2, '0') + ":" +
             fecha.getMinutes().toString().padStart(2, '0');

// 📷 IMAGEN
if (data.texto && data.texto.includes("http")) {
  chat.innerHTML += `
    <p>
      <b>${data.usuario}:</b> 
      <span style="color:#888; font-size:11px;">${hora}</span>
      ${botonBorrar}
    </p>
    <img src="${data.texto.trim()}" style="max-width:200px;">
  `;
} 

// 💬 TEXTO
else {
  chat.innerHTML += `
    <p>
      <b>${data.usuario}:</b> ${data.texto}
      <span style="color:#888; font-size:11px; margin-left:5px;">${hora}</span>
      ${botonBorrar}
    </p>
  `;
}

    // 🔔 NOTIFICACIÓN
    if (!primeraCarga && data.usuario !== usuarioActual) {
      if (Notification.permission === "granted") {
        new Notification("Nuevo mensaje", {
          body: data.usuario + ": " + data.texto
        });
      }
    }
  });

  chat.scrollTop = chat.scrollHeight;
  primeraCarga = false;
});

/* 📤 ENVIAR */
window.enviar = async function() {
  const texto = document.getElementById("mensaje").value;
  if (texto === "") return;

  await addDoc(collection(db, "mensajes"), {
    usuario: usuarioActual,
    texto: texto,
    fecha: Date.now()
  });

  document.getElementById("mensaje").value = "";
};

/* 🗑️ BORRAR */
window.borrar = async function(id) {
  await deleteDoc(doc(db, "mensajes", id));
};

/* 🚪 LOGOUT */
window.logout = function() {
  signOut(auth).then(() => {
    window.location.href = "index.html";
  });
};

/* 📁 CARPETAS */
window.abrir = function(seccion) {
  document.getElementById("info").style.display = "none";
  document.getElementById("notas").style.display = "none";
  document.getElementById("chat").style.display = "none";

  document.getElementById(seccion).style.display = "block";
};

/* 💾 GUARDAR INFO */
window.guardarInfo = async function() {
  const texto = document.getElementById("textoInfo").value;

  await setDoc(doc(db, "documentos", "info"), {
    contenido: texto
  });
};

/* 📥 CARGAR INFO */
async function cargarInfo() {
  const docRef = doc(db, "documentos", "info");
  const docSnap = await getDoc(docRef);

  if (docSnap.exists()) {
    document.getElementById("textoInfo").value = docSnap.data().contenido;
  
  }
}
  const nombres = {
  "systexhyisx@gmail_com": "Systex",
  "twicehyisx@gmail_com": "Twice"
};
onValue(ref(rtdb, "usuarios"), (snapshot) => {
  const data = snapshot.val();
  const contenedor = document.getElementById("usuariosOnline");

  contenedor.innerHTML = "<b>Usuarios:</b><br>";

  if (!data) return;

  for (let user in data) {
    const info = data[user];

    let estado = "";

    if (info.online) {
      estado = "🟢 En línea";
    } else {
      const ahora = Date.now();
      const diferencia = Math.floor((ahora - info.ultimaConexion) / 1000);

      if (diferencia < 60) {
        estado = "🔴 hace unos segundos";
      } else if (diferencia < 3600) {
        estado = "🔴 hace " + Math.floor(diferencia / 60) + " min";
      } else {
        estado = "🔴 hace " + Math.floor(diferencia / 3600) + " h";
      }
    }

  const nombre = nombres[user] || user.replace(/_/g, ".");

    contenedor.innerHTML += `${estado} ${nombre}<br>`;
  }
});
</script>

</body>
</html>
