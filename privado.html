<!DOCTYPE html>
<html>
<head>
  <title>Chat</title>
</head>
<body>

<h2>Chat 💬</h2>

<button onclick="abrir('info')">📁 Información</button>
<button onclick="abrir('notas')">📁 Notas</button>
<button onclick="abrir('chat')">💬 Chat</button>

<br><br>

<div id="info" style="display:none;">
  <h3>Información</h3>
  <textarea id="textoInfo"></textarea>
  <button onclick="guardarInfo()">Guardar</button>
</div>

<div id="notas" style="display:none;">
  <h3>Notas</h3>
  <textarea id="textoNotas"></textarea>
  <button onclick="guardarNotas()">Guardar</button>
</div>

<div id="chat" style="height:300px; overflow-y:auto; border:1px solid #ccc; padding:10px;"></div>

<input type="text" id="mensaje" placeholder="Escribe algo">
<button onclick="enviar()">Enviar</button>

<br><br>
<button onclick="logout()">Cerrar sesión</button>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { getFirestore, collection, addDoc, onSnapshot, doc, setDoc, getDoc, query, orderBy, deleteDoc } 
from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyDVR8vCGuKYjUR-9v_x80fNY5bPewMaxKU",
  authDomain: "hyisx-b4490.firebaseapp.com",
  projectId: "hyisx-b4490",
  storageBucket: "hyisx-b4490.firebasestorage.app",
  messagingSenderId: "960225169942",
  appId: "1:960225169942:web:f93314f0227420c75b5b37"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

let usuarioActual = null;

/* 🔐 LOGIN */
onAuthStateChanged(auth, (user) => {
  if (!user) {
    window.location.href = "index.html";
  } else {
    usuarioActual = user.email;
    cargarInfo();
    abrir("chat");
  }
});

/* 💬 CHAT */
const q = query(collection(db, "mensajes"), orderBy("fecha", "asc"));

onSnapshot(q, (snapshot) => {
  const chat = document.getElementById("chat");
  chat.innerHTML = "";

  snapshot.forEach((docu) => {
    const data = docu.data();

    let botonBorrar = "";

    // 👑 SOLO TÚ (CAMBIA EL CORREO SI ES NECESARIO)
    if (usuarioActual === "systex@gmail.com") {
      botonBorrar = `<button onclick="borrar('${docu.id}')">❌</button>`;
    }

    if (data.texto && data.texto.includes("http")) {
      chat.innerHTML += `
        <p><b>${data.usuario}:</b> ${botonBorrar}</p>
        <img src="${data.texto.trim()}" style="max-width:200px;">
      `;
    } else {
      chat.innerHTML += `
        <p><b>${data.usuario}:</b> ${data.texto} ${botonBorrar}</p>
      `;
    }
  });

  chat.scrollTop = chat.scrollHeight;
});

/* 📤 ENVIAR */
window.enviar = async function() {
  const texto = document.getElementById("mensaje").value;

  if (texto === "") return;

  await addDoc(collection(db, "mensajes"), {
    usuario: usuarioActual,
    texto: texto,
    fecha: Date.now()
  });

  document.getElementById("mensaje").value = "";
};

/* 🗑️ BORRAR */
window.borrar = async function(id) {
  await deleteDoc(doc(db, "mensajes", id));
};

/* 🚪 LOGOUT */
window.logout = function() {
  signOut(auth).then(() => {
    window.location.href = "index.html";
  });
};

/* 📁 CARPETAS */
window.abrir = function(seccion) {
  document.getElementById("info").style.display = "none";
  document.getElementById("notas").style.display = "none";
  document.getElementById("chat").style.display = "none";

  document.getElementById(seccion).style.display = "block";
};

/* 💾 GUARDAR INFO */
window.guardarInfo = async function() {
  const texto = document.getElementById("textoInfo").value;

  await setDoc(doc(db, "documentos", "info"), {
    contenido: texto
  });
};

/* 📥 CARGAR INFO */
async function cargarInfo() {
  const docRef = doc(db, "documentos", "info");
  const docSnap = await getDoc(docRef);

  if (docSnap.exists()) {
    document.getElementById("textoInfo").value = docSnap.data().contenido;
  }
}

</script>

</body>
</html>
